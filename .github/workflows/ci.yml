name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  web_release_package:
    name: Web Release Package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release ZIP
        shell: pwsh
        run: ./scripts/create_release_zip.ps1

      - name: Verify ZIP integrity
        shell: pwsh
        run: ./scripts/verify_release_zip.ps1

      - name: Upload release ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_arbeitsnachweis_paket
          path: web_arbeitsnachweis_paket.zip
